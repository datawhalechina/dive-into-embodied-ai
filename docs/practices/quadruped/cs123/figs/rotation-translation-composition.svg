<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">旋转、平移与组合变换示意图</title>
  <desc id="desc">三栏图分别说明旋转只改变方向，平移只改变位置，组合变换先旋转再平移。</desc>
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.4; }
      .grid { stroke: #e8eef6; stroke-width: 1; }
      .axis { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow-gray); }
      .axis-b { stroke: #7c3aed; stroke-width: 2; marker-end: url(#arrow-gray); }
      .vec-blue { stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); fill: none; }
      .vec-red { stroke: #dc2626; stroke-width: 4; marker-end: url(#arrow-red); fill: none; }
      .vec-green { stroke: #16a34a; stroke-width: 4; marker-end: url(#arrow-green); fill: none; }
      .arc { stroke: #f59e0b; stroke-width: 3; marker-end: url(#arrow-gray); fill: none; }
      .dash { stroke-dasharray: 6 6; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .formula { font: 16px "Times New Roman", serif; fill: #0f172a; }
      .dot { fill: #0f172a; }
    </style>
  </defs>

  <rect x="18" y="18" width="328" height="394" rx="14" class="panel"/>
  <rect x="386" y="18" width="328" height="394" rx="14" class="panel"/>
  <rect x="754" y="18" width="328" height="394" rx="14" class="panel"/>

  <text x="42" y="56" class="title">旋转 R</text>
  <text x="410" y="56" class="title">平移 t</text>
  <text x="778" y="56" class="title">组合 R p + t</text>

  <g transform="translate(60 92)">
    <path d="M0 160 H250 M80 0 V260" class="grid"/>
    <path d="M0 120 H250" class="axis"/>
    <path d="M80 250 V12" class="axis"/>
    <text x="238" y="143" class="small">x</text>
    <text x="90" y="24" class="small">y</text>
    <circle cx="80" cy="120" r="4" class="dot"/>
    <text x="62" y="142" class="small">O</text>
    <path d="M80 120 L170 120" class="vec-blue"/>
    <path d="M80 120 L80 30" class="vec-red"/>
    <path d="M118 120 A52 52 0 0 0 80 82" class="arc"/>
    <text x="128" y="108" class="formula">p=(1,0)</text>
    <text x="90" y="50" class="formula">R p=(0,1)</text>
    <text x="106" y="86" class="small">90°</text>
    <text x="18" y="302" class="label">原点不动，只把方向转过去</text>
  </g>

  <g transform="translate(428 92)">
    <path d="M0 160 H250 M60 0 V260" class="grid"/>
    <path d="M0 150 H250" class="axis"/>
    <path d="M60 250 V12" class="axis"/>
    <text x="238" y="173" class="small">x</text>
    <text x="70" y="24" class="small">y</text>
    <circle cx="60" cy="150" r="4" class="dot"/>
    <text x="42" y="172" class="small">O</text>
    <circle cx="105" cy="150" r="5" fill="#2563eb"/>
    <text x="116" y="144" class="formula">p</text>
    <path d="M105 150 L195 105" class="vec-green"/>
    <circle cx="195" cy="105" r="5" fill="#16a34a"/>
    <text x="204" y="99" class="formula">p+t</text>
    <text x="128" y="118" class="formula">t=(2,1)</text>
    <path d="M60 150 L150 105" class="vec-green dash"/>
    <text x="22" y="302" class="label">方向不变，把整个对象搬一段</text>
  </g>

  <g transform="translate(790 92)">
    <path d="M0 160 H260 M70 0 V260" class="grid"/>
    <path d="M0 165 H260" class="axis"/>
    <path d="M70 250 V12" class="axis"/>
    <text x="248" y="188" class="small">A-x</text>
    <text x="80" y="24" class="small">A-y</text>
    <circle cx="70" cy="165" r="4" class="dot"/>
    <text x="52" y="187" class="small">A</text>
    <path d="M70 165 L160 120" class="vec-green"/>
    <text x="104" y="133" class="formula">t</text>
    <circle cx="160" cy="120" r="4" class="dot"/>
    <text x="144" y="142" class="small">B</text>
    <path d="M160 120 L160 38" class="vec-blue"/>
    <path d="M160 120 L245 120" class="axis-b"/>
    <path d="M160 120 L160 38" class="axis-b"/>
    <text x="232" y="111" class="small">B-y</text>
    <text x="170" y="46" class="small">B-x</text>
    <circle cx="160" cy="38" r="5" fill="#dc2626"/>
    <text x="174" y="42" class="formula">p_A=(2,2)</text>
    <text x="19" y="302" class="label">先把 B 中的 p 转到 A 的方向，再加 t</text>
  </g>
</svg>
