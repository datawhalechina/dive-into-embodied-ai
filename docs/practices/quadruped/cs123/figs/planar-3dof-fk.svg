<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" role="img" aria-labelledby="title desc">
  <title id="title">平面 3-DoF 机械臂正运动学示意图</title>
  <desc id="desc">图示三段平面机械臂中每段连杆的累计角度，以及末端位置 x 和 y 如何由三段投影相加得到。</desc>
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .panel { fill: #fff; stroke: #dbe3ef; stroke-width: 1.5; }
      .axis { stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow-slate); fill: none; }
      .link1 { stroke: #2563eb; stroke-width: 8; stroke-linecap: round; }
      .link2 { stroke: #16a34a; stroke-width: 8; stroke-linecap: round; }
      .link3 { stroke: #d97706; stroke-width: 8; stroke-linecap: round; }
      .proj { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; fill: none; }
      .xsum { stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); fill: none; }
      .ysum { stroke: #dc2626; stroke-width: 4; marker-end: url(#arrow-red); fill: none; }
      .angle { stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow-slate); fill: none; }
      .joint { fill: #fff; stroke: #0f172a; stroke-width: 3; }
      .ee { fill: #dc2626; stroke: #991b1b; stroke-width: 2; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .math { font: italic 19px "Times New Roman", serif; fill: #0f172a; }
      .note { fill: #f8fafc; stroke: #dbe3ef; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="18" y="18" width="1064" height="564" rx="14" class="panel"/>
  <text x="48" y="60" class="title">平面 3-DoF：末端位置来自三段连杆投影相加</text>

  <!-- Coordinates: O=(150,430), P1=(339,325), P2=(500,190), P3=(652,150) -->
  <g>
    <line x1="150" y1="430" x2="840" y2="430" class="axis"/>
    <line x1="150" y1="430" x2="150" y2="90" class="axis"/>
    <text x="850" y="436" class="small">x</text>
    <text x="160" y="100" class="small">y</text>

    <line x1="150" y1="430" x2="652" y2="430" class="xsum"/>
    <line x1="652" y1="430" x2="652" y2="150" class="ysum"/>
    <text x="386" y="464" class="math">x</text>
    <text x="670" y="295" class="math">y</text>

    <path d="M339 325 V430" class="proj"/>
    <path d="M500 190 V430" class="proj"/>
    <path d="M652 150 V430" class="proj"/>
    <path d="M150 325 H339" class="proj"/>
    <path d="M150 190 H500" class="proj"/>
    <path d="M150 150 H652" class="proj"/>

    <line x1="150" y1="430" x2="339" y2="325" class="link1"/>
    <line x1="339" y1="325" x2="500" y2="190" class="link2"/>
    <line x1="500" y1="190" x2="652" y2="150" class="link3"/>

    <circle cx="150" cy="430" r="9" class="joint"/>
    <circle cx="339" cy="325" r="8" class="joint"/>
    <circle cx="500" cy="190" r="8" class="joint"/>
    <circle cx="652" cy="150" r="9" class="ee"/>

    <text x="230" y="360" class="math">L<tspan baseline-shift="sub" font-size="13">1</tspan></text>
    <text x="405" y="248" class="math">L<tspan baseline-shift="sub" font-size="13">2</tspan></text>
    <text x="570" y="157" class="math">L<tspan baseline-shift="sub" font-size="13">3</tspan></text>
    <text x="666" y="145" class="small">end</text>

    <path d="M205 430 A55 55 0 0 0 198 403" class="angle"/>
    <text x="211" y="405" class="math">θ<tspan baseline-shift="sub" font-size="13">1</tspan></text>

    <path d="M392 325 A54 54 0 0 0 380 290" class="angle"/>
    <text x="394" y="292" class="math">θ<tspan baseline-shift="sub" font-size="13">2</tspan></text>

    <path d="M552 190 A52 52 0 0 0 544 170" class="angle"/>
    <text x="557" y="174" class="math">θ<tspan baseline-shift="sub" font-size="13">3</tspan></text>
  </g>

  <g transform="translate(740 126)">
    <rect x="0" y="0" width="304" height="310" rx="12" class="note"/>
    <text x="24" y="38" class="title" font-size="20">逐段读投影</text>
    <text x="24" y="78" class="label">第 1 段方向角：</text>
    <text x="166" y="78" class="math">θ<tspan baseline-shift="sub" font-size="13">1</tspan></text>
    <text x="24" y="124" class="label">第 2 段方向角：</text>
    <text x="166" y="124" class="math">θ<tspan baseline-shift="sub" font-size="13">1</tspan> + θ<tspan baseline-shift="sub" font-size="13">2</tspan></text>
    <text x="24" y="170" class="label">第 3 段方向角：</text>
    <text x="166" y="170" class="math">θ<tspan baseline-shift="sub" font-size="13">1</tspan> + θ<tspan baseline-shift="sub" font-size="13">2</tspan> + θ<tspan baseline-shift="sub" font-size="13">3</tspan></text>
    <line x1="24" y1="204" x2="280" y2="204" stroke="#dbe3ef" stroke-width="1.5"/>
    <text x="24" y="238" class="label">每段对 x 的贡献：</text>
    <text x="24" y="264" class="math">L<tspan baseline-shift="sub" font-size="13">k</tspan> cos(累计角)</text>
    <text x="24" y="292" class="label">每段对 y 的贡献：</text>
    <text x="166" y="292" class="math">L<tspan baseline-shift="sub" font-size="13">k</tspan> sin(累计角)</text>
  </g>
</svg>
