<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">URDF 父子链 joint 结构示意图</title>
  <desc id="desc">图示一个 URDF joint 如何连接 parent link 和 child link，并把变换拆成 origin 固定偏置与 axis 关节运动。</desc>
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      .panel { fill: #fff; stroke: #dbe3ef; stroke-width: 1.5; }
      .box-parent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .box-origin { fill: #f8fafc; stroke: #64748b; stroke-width: 2; }
      .box-motion { fill: #fff7ed; stroke: #d97706; stroke-width: 2; }
      .box-child { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; }
      .note { fill: #f8fafc; stroke: #dbe3ef; stroke-width: 1.5; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .code { font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #0f172a; }
      .math { font: italic 18px "Times New Roman", serif; fill: #0f172a; }
      .flow { stroke: #475569; stroke-width: 3; marker-end: url(#arrow-slate); fill: none; }
      .axis { stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow-slate); fill: none; }
      .offset { stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); fill: none; }
      .joint-axis { stroke: #16a34a; stroke-width: 4; marker-end: url(#arrow-green); fill: none; }
      .rotate { stroke: #d97706; stroke-width: 4; marker-end: url(#arrow-amber); fill: none; }
      .dot { fill: #d97706; }
    </style>
  </defs>

  <rect x="18" y="18" width="1064" height="584" rx="14" class="panel"/>
  <text x="48" y="60" class="title">URDF / MJCF：一个 joint 连接 parent link 和 child link</text>

  <g transform="translate(70 94)">
    <rect x="0" y="0" width="160" height="96" rx="10" class="box-parent"/>
    <text x="36" y="38" class="subtitle">parent link</text>
    <text x="51" y="66" class="code">link1</text>

    <path d="M176 48 H220" class="flow"/>

    <rect x="238" y="0" width="190" height="96" rx="10" class="box-origin"/>
    <text x="286" y="36" class="subtitle">fixed offset</text>
    <text x="276" y="64" class="code">&lt;origin xyz/&gt;</text>

    <path d="M444 48 H488" class="flow"/>

    <rect x="506" y="0" width="190" height="96" rx="10" class="box-motion"/>
    <text x="547" y="36" class="subtitle">joint motion</text>
    <text x="544" y="64" class="code">axis + theta</text>

    <path d="M712 48 H756" class="flow"/>

    <rect x="774" y="0" width="160" height="96" rx="10" class="box-child"/>
    <text x="815" y="38" class="subtitle">child link</text>
    <text x="827" y="66" class="code">link2</text>
  </g>

  <g transform="translate(88 230)">
    <text x="0" y="0" class="subtitle">几何上可以这样看</text>

    <line x1="190" y1="240" x2="190" y2="44" class="axis"/>
    <line x1="190" y1="240" x2="414" y2="240" class="axis"/>
    <text x="424" y="246" class="small">parent x</text>
    <text x="201" y="54" class="small">parent z</text>

    <path d="M190 240 L330 240" class="offset"/>
    <text x="218" y="219" class="code">origin xyz="0.3 0 0"</text>

    <circle cx="330" cy="240" r="7" class="dot"/>
    <text x="344" y="266" class="small">joint 原点</text>

    <path d="M330 240 L330 104" class="joint-axis"/>
    <text x="350" y="143" class="code">axis="0 0 1"</text>

    <path d="M368 240 A48 48 0 0 0 346 200" class="rotate"/>

    <rect x="520" y="42" width="438" height="88" rx="10" class="note"/>
    <text x="546" y="76" class="subtitle">origin 是固定的</text>
    <text x="546" y="106" class="label">它决定 joint 原点相对 parent 坐标系的位置和姿态。</text>

    <rect x="520" y="160" width="438" height="116" rx="10" class="note"/>
    <text x="546" y="194" class="subtitle">axis 和关节变量产生运动</text>
    <text x="546" y="224" class="label">旋转关节：绕 axis 旋转 θ。</text>
    <text x="546" y="252" class="label">移动关节：沿 axis 平移 d。</text>

    <text x="188" y="338" class="label">对应矩阵：</text>
    <text x="286" y="338" class="math">T</text>
    <text x="298" y="344" class="math" font-size="13">=</text>
    <text x="322" y="338" class="math">T<tspan baseline-shift="sub" font-size="13">offset</tspan></text>
    <text x="402" y="338" class="math">·</text>
    <text x="424" y="338" class="math">T<tspan baseline-shift="sub" font-size="13">joint</tspan>(θ)</text>
    <text x="548" y="338" class="small">先固定偏置，再施加关节运动</text>
  </g>
</svg>
